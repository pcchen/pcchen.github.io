site_name: Qubit Research Group
site_author: Pochung Chen
site_url: https://pcchen.github.io/

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - CV: cv.md
  - Members: members.md
  - Publications: publications.md
  # - Cytnx: Cytnx.md
  # - Teaching:
  #   - General Physics A (II): teaching/11420PHYS114402.md
  - 11420PHYS114402: teaching/11420PHYS114402.md
  - Statistical Mechanics (II): teaching/11510PHYS522000.md
  - 書報討論--凝態一: teaching/11510PHYS595001.md
